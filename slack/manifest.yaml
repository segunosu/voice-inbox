# Voice Inbox — thin Slack app manifest (ADR-0003).
# Create at https://api.slack.com/apps → "Create New App" → "From an app manifest".
# NOTE: create the app ONLY after the slack-ingest Edge Function is deployed —
# Slack verifies the events request_url with a challenge at save time.
display_information:
  name: Voice Inbox
  description: "Speak once: record an audio clip and the right project receives structured work."
  background_color: "#2b2d31"
features:
  bot_user:
    display_name: Voice Inbox
    always_online: true
oauth_config:
  scopes:
    bot:
      - files:read
      - channels:history
      - groups:history
      - im:history
      - im:write
      - chat:write
      - users:read
settings:
  event_subscriptions:
    request_url: https://oqruqictijboujiuzqnf.supabase.co/functions/v1/slack-ingest
    bot_events:
      - message.channels
      - message.groups
      - message.im
  interactivity:
    is_enabled: true
    request_url: https://oqruqictijboujiuzqnf.supabase.co/functions/v1/slack-interact
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
